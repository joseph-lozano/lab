---
- name: Allow outbound traffic by default
  community.general.ufw:
    direction: outgoing
    policy: allow

- name: Deny inbound traffic by default
  community.general.ufw:
    direction: incoming
    policy: deny

- name: Allow Tailscale direct UDP when enabled
  community.general.ufw:
    rule: allow
    port: '41641'
    proto: udp
    comment: Tailscale direct UDP default port; change this if tailscaled --port changes.
  when: allow_direct_udp | bool

- name: Allow SSH only from Tailscale interface
  community.general.ufw:
    rule: allow
    direction: in
    interface: tailscale0
    port: '22'
    proto: tcp
    comment: SSH is reachable only over Tailscale; public ingress remains denied.

- name: Enable firewall after Tailscale confirmation
  community.general.ufw:
    state: enabled

